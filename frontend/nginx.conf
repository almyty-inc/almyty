server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.almyty.com;" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 'healthy';
        add_header Content-Type text/plain;
    }

    # ---------------------------------------------------------------
    # PostHog reverse proxy.
    #
    # The browser only ever talks to this app origin — never to
    # eu.i.posthog.com — so ad blockers (uBlock, Brave, Safari ITP)
    # have no third-party host to drop. nginx forwards the traffic to
    # PostHog Cloud EU server-side. The client points api_host at
    # '/ingest' (see frontend/src/lib/analytics.ts).
    #
    # Two upstreams, per PostHog's documented reverse-proxy spec:
    #   - eu-assets.i.posthog.com/static  → the JS asset bundle
    #   - eu.i.posthog.com                → event ingestion + decide
    #
    # CONFIGURABLE HOSTS: change these two upstream hostnames here if
    # PostHog ever moves regions. They are the only place the external
    # target is named on the proxy side (the client path is set in
    # analytics.ts / VITE_POSTHOG_HOST). A runtime resolver is used so
    # the hostnames are re-resolved and a rotated PostHog IP doesn't
    # strand the proxy on a stale address.
    resolver 1.1.1.1 8.8.8.8 valid=60s ipv6=off;

    # Asset bundle (array-full.js etc.). Kept first so it wins over
    # the /ingest/ prefix below for /ingest/static/*.
    location /ingest/static/ {
        set $ph_assets "eu-assets.i.posthog.com";
        proxy_pass https://$ph_assets/static/;
        proxy_set_header Host "eu-assets.i.posthog.com";
        proxy_ssl_server_name on;
        proxy_ssl_name eu-assets.i.posthog.com;
        # Static, immutable, hashed bundles — let the browser cache them.
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=86400";
    }

    # Event ingestion + feature-flag decide endpoints.
    location /ingest/ {
        set $ph_ingest "eu.i.posthog.com";
        proxy_pass https://$ph_ingest/;
        proxy_set_header Host "eu.i.posthog.com";
        proxy_ssl_server_name on;
        proxy_ssl_name eu.i.posthog.com;
        # Preserve the client's real IP for PostHog geo/session logic
        # without leaking internal hop addresses.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Do NOT rewrite the response body — PostHog returns opaque
        # payloads the SDK parses byte-for-byte.
        proxy_redirect off;
    }

    # Static asset caching - hashed filenames get long cache (1 year, immutable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html must never be cached (SPA entry point)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # SPA routing - serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
        # Non-asset files (HTML fallback) should not be cached
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Disable access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
