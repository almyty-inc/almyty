# Dependabot configuration for continuous dependency patching.
#
# Opens automated PRs against the `development` branch (the integration
# branch — dev promotes to staging then master; deps must flow the same
# path, never land straight on master). Combined with the `npm audit` +
# Trivy jobs in .github/workflows/ci.yml, this is the other half of a
# working dependency-hygiene story: CI catches KNOWN vulnerable versions
# on every PR, and Dependabot keeps proposing the patches that make CI
# pass.
#
# Scope:
#
#   - backend + frontend + docs-site: npm ecosystem, monthly cadence
#     (a critical advisory still lands within a few weeks, and one
#     grouped PR a month keeps the review queue quiet)
#
#   - .github/workflows: GitHub Actions versions. actions/checkout and
#     actions/setup-node majors are IGNORED — they're intentionally
#     pinned at v6 per the repo's Deploy Pins (CLAUDE.md); Dependabot
#     kept reopening v7 bumps that we have to close by hand.
#
#   - docker: the Dockerfile FROM lines for backend / frontend /
#     docs-site. Base image updates (Alpine CVEs, Node security
#     releases) otherwise get noticed only when someone manually
#     runs Trivy against a deploy months later.
#
# Opens max 5 PRs per ecosystem at a time so a lock-file regen burst
# doesn't overwhelm review. Each npm ecosystem groups ALL version bumps
# (major + minor + patch) into a single monthly PR, so a whole month of
# updates lands as one green branch instead of a dozen separate PRs.
# Security advisories still open as their own PRs regardless of grouping.
version: 2
updates:
  # ── Backend (NestJS API) ────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/backend"
    target-branch: "development"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      backend-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "major"
          - "minor"
          - "patch"

  # ── Frontend (React/Vite) ───────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "development"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      frontend-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "major"
          - "minor"
          - "patch"

  # ── Docs site (Nextra) ──────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/docs-site"
    target-branch: "development"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docs"
    groups:
      docs-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "major"
          - "minor"
          - "patch"

  # ── GitHub Actions workflow pins ────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "development"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    ignore:
      # Pinned at v6 per Deploy Pins (CLAUDE.md) — do not bump majors.
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]

  # ── Dockerfiles ─────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/backend"
    target-branch: "development"
    schedule:
      interval: "monthly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/frontend"
    target-branch: "development"
    schedule:
      interval: "monthly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/docs-site"
    target-branch: "development"
    schedule:
      interval: "monthly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
