name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "production" to confirm deployment'
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/frane/almyty

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "production" ]; then
            echo "❌ You must type 'production' to confirm deployment"
            exit 1
          fi
          echo "✅ Production deployment confirmed"

  build-and-deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:production-${{ github.sha }}
            ${{ env.REGISTRY }}/api:production-latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api.almyty.com
          tags: |
            ${{ env.REGISTRY }}/frontend:production-${{ github.sha }}
            ${{ env.REGISTRY }}/frontend:production-latest

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Create namespace
        run: kubectl create namespace almyty-production --dry-run=client -o yaml | kubectl apply -f -

      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=almyty-production \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create application secrets
        run: |
          kubectl create secret generic almyty-secrets \
            --from-literal=DATABASE_USERNAME=${{ secrets.PROD_DATABASE_USERNAME }} \
            --from-literal=DATABASE_PASSWORD=${{ secrets.PROD_DATABASE_PASSWORD }} \
            --from-literal=REDIS_PASSWORD="" \
            --from-literal=JWT_SECRET=${{ secrets.PROD_JWT_SECRET }} \
            --from-literal=RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} \
            --namespace=almyty-production \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update image tags with git SHA
        run: |
          cd k8s/overlays/production
          sed -i "s/newTag: production-.*/newTag: production-${{ github.sha }}/g" kustomization.yaml

      - name: Deploy to production
        run: |
          kubectl apply -k k8s/overlays/production
          kubectl rollout status deployment/prod-api -n almyty-production --timeout=5m
          kubectl rollout status deployment/prod-frontend -n almyty-production --timeout=5m

      - name: Verify health
        run: |
          echo "Waiting for pods to be ready..."
          sleep 30
          kubectl get pods -n almyty-production
