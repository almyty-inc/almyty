name: Deploy to Staging

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/frane/apifai
  TAG: staging-${{ github.sha }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ env.TAG }}
            ${{ env.REGISTRY }}/api:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api.staging.apif.ai
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ env.TAG }}
            ${{ env.REGISTRY }}/frontend:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Create ImagePullSecret for GHCR
        run: |
          kubectl create namespace apifai-staging --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_PAT }} \
            --namespace=apifai-staging \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create application secrets
        run: |
          kubectl create secret generic apifai-secrets \
            --from-literal=DATABASE_USERNAME=${{ secrets.STAGING_DATABASE_USERNAME }} \
            --from-literal=DATABASE_PASSWORD=${{ secrets.STAGING_DATABASE_PASSWORD }} \
            --from-literal=DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }} \
            --from-literal=REDIS_PASSWORD="" \
            --from-literal=REDIS_URL="redis://staging-apifai-redis:6379" \
            --from-literal=JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }} \
            --namespace=apifai-staging \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update image tags with git SHA
        run: |
          cd k8s/overlays/staging
          sed -i "s/newTag: staging-.*/newTag: staging-${{ github.sha }}/g" kustomization.yaml
          cat kustomization.yaml

      - name: Deploy to staging
        run: |
          kubectl apply -k k8s/overlays/staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/staging-api -n apifai-staging --timeout=5m
          kubectl rollout status deployment/staging-frontend -n apifai-staging --timeout=5m

      - name: Deployment summary
        run: |
          echo "🚀 Deployed to staging!"
          echo "📦 Version: staging-${{ github.sha }}"
          echo ""
          echo "🌐 URLs:"
          echo "  API: https://api.staging.apif.ai"
          echo "  App: https://app.staging.apif.ai"
