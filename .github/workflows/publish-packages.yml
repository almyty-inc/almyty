name: Publish npm Packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - skills-cli
          - mcp-server
          - both
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  publish-skills:
    if: inputs.package == 'skills-cli' || inputs.package == 'both'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org'

      - name: Build and publish @almyty/skills
        working-directory: packages/skills-cli
        run: |
          npm version ${{ inputs.version_bump }} --no-git-tag-version
          npm install
          npm run build
          npm publish --access public

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/skills-cli/package.json
          git diff --cached --quiet || git commit -m "chore: publish @almyty/skills (${{ inputs.version_bump }})"
          git push

  publish-mcp-server:
    if: inputs.package == 'mcp-server' || inputs.package == 'both'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org'

      - name: Build and publish @almyty/mcp-server
        working-directory: packages/mcp-server
        run: |
          npm version ${{ inputs.version_bump }} --no-git-tag-version
          npm install
          npm run build
          npm publish --access public

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/mcp-server/package.json
          git diff --cached --quiet || git commit -m "chore: publish @almyty/mcp-server (${{ inputs.version_bump }})"
          git push
