name: Publish npm Packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - skills-cli
          - mcp-server
          - auth-cli
          - agents-cli
          - chat-cli
          - almyty-cli
          - acp-server
          - runner
          - client
          - mcp-mux
          - all
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major
        default: none

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: skills-cli
            npm_name: "@almyty/skills"
            dir: packages/skills-cli
          - id: mcp-server
            npm_name: "@almyty/mcp-server"
            dir: packages/mcp-server
          - id: auth-cli
            npm_name: "@almyty/auth"
            dir: packages/auth-cli
          - id: agents-cli
            npm_name: "@almyty/agents"
            dir: packages/agents-cli
          - id: chat-cli
            npm_name: "@almyty/chat"
            dir: packages/chat-cli
          - id: almyty-cli
            npm_name: "@almyty/cli"
            dir: packages/almyty-cli
          - id: acp-server
            npm_name: "@almyty/acp-server"
            dir: packages/acp-server
          - id: runner
            npm_name: "@almyty/runner"
            dir: packages/runner
          - id: client
            npm_name: "@almyty/client"
            dir: packages/client
          - id: mcp-mux
            npm_name: "@almyty/mcp-mux"
            dir: packages/mcp-mux
    steps:
      - name: Skip if not selected
        if: inputs.package != 'all' && inputs.package != matrix.id
        run: echo "Skipping ${{ matrix.npm_name }}" && exit 0

      - uses: actions/checkout@v6
        if: inputs.package == 'all' || inputs.package == matrix.id

      - uses: actions/setup-node@v6
        if: inputs.package == 'all' || inputs.package == matrix.id
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Build and publish ${{ matrix.npm_name }}
        if: inputs.package == 'all' || inputs.package == matrix.id
        working-directory: ${{ matrix.dir }}
        run: |
          # OIDC trusted publishing: npm authenticates via the GitHub
          # Actions id-token (permissions: id-token: write above) against
          # the trusted publisher configured on npmjs.com for this repo +
          # workflow filename. No NPM_TOKEN needed. Requires npm >= 11.5.
          npm install -g npm@latest
          # 'none' publishes the committed version as-is (clean lockstep);
          # patch/minor/major bump first if explicitly requested.
          if [ "${{ inputs.version_bump }}" != "none" ]; then
            npm version ${{ inputs.version_bump }} --no-git-tag-version
          fi
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          # Idempotent: skip if this exact version is already on npm, so the
          # wave is safely re-runnable for the client->dependents bootstrap.
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "$PKG@$VER already published — skipping."
            echo "SKIP_PUBLISH=1" >> "$GITHUB_ENV"
            exit 0
          fi
          npm install --legacy-peer-deps --no-audit --no-fund
          npm run build || true
          npm publish --access public --provenance

      - name: Commit version bump
        if: (inputs.package == 'all' || inputs.package == matrix.id) && inputs.version_bump != 'none' && env.SKIP_PUBLISH != '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ matrix.dir }}/package.json
          git diff --cached --quiet || git commit -m "chore: publish ${{ matrix.npm_name }} (${{ inputs.version_bump }})"
          git push
