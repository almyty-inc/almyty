name: Restart Pods

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - development
          - production
      component:
        description: 'Which component to restart'
        required: true
        type: choice
        options:
          - all
          - api
          - frontend

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Set env vars
        id: vars
        run: |
          case "${{ inputs.environment }}" in
            production)  echo "ns=almyty-production" >> $GITHUB_OUTPUT; echo "prefix=prod" >> $GITHUB_OUTPUT ;;
            development) echo "ns=almyty-dev" >> $GITHUB_OUTPUT;        echo "prefix=dev" >> $GITHUB_OUTPUT ;;
            *)           echo "ns=almyty-staging" >> $GITHUB_OUTPUT;    echo "prefix=staging" >> $GITHUB_OUTPUT ;;
          esac

      - name: Restart pods
        run: |
          NS="${{ steps.vars.outputs.ns }}"
          PFX="${{ steps.vars.outputs.prefix }}"

          if [ "${{ inputs.component }}" = "all" ] || [ "${{ inputs.component }}" = "api" ]; then
            echo "Restarting ${PFX}-api..."
            kubectl rollout restart deployment/${PFX}-api -n ${NS}
            kubectl rollout status deployment/${PFX}-api -n ${NS} --timeout=5m
          fi

          if [ "${{ inputs.component }}" = "all" ] || [ "${{ inputs.component }}" = "frontend" ]; then
            echo "Restarting ${PFX}-frontend..."
            kubectl rollout restart deployment/${PFX}-frontend -n ${NS}
            kubectl rollout status deployment/${PFX}-frontend -n ${NS} --timeout=5m
          fi

      - name: Show pod status
        if: always()
        run: |
          NS="${{ steps.vars.outputs.ns }}"
          PFX="${{ steps.vars.outputs.prefix }}"
          kubectl get pods -n ${NS} -l "app in (${PFX}-api,${PFX}-frontend)"

      - name: Show logs on failure
        if: failure()
        run: |
          NS="${{ steps.vars.outputs.ns }}"
          PFX="${{ steps.vars.outputs.prefix }}"
          echo "=== API pod logs ==="
          kubectl logs -n ${NS} -l app=${PFX}-api --tail=50 --all-containers 2>&1 || true
