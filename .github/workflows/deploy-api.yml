name: API

on:
  push:
    branches: [development, staging]
    paths:
      - 'backend/**'
      - 'k8s/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      image_tag:
        description: 'Deploy existing image tag (skip build)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: api-${{ github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/frane/almyty

jobs:
  build:
    name: Build API
    runs-on: ubuntu-latest
    if: inputs.image_tag == ''
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/setup-buildx-action@v4

      - name: Resolve tag
        id: tag
        run: |
          case "${{ inputs.environment || github.ref_name }}" in
            production)  PREFIX="production" ;;
            staging)     PREFIX="staging" ;;
            *)           PREFIX="dev" ;;
          esac
          echo "tag=${PREFIX}-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/api:${{ steps.tag.outputs.prefix }}-latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: build
    if: always() && !failure()
    steps:
      - uses: actions/checkout@v6

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Resolve environment
        id: env
        run: |
          ENV="${{ inputs.environment || github.ref_name }}"
          case "$ENV" in
            production)  echo "ns=almyty-production" >> $GITHUB_OUTPUT; echo "pfx=prod" >> $GITHUB_OUTPUT; echo "overlay=production" >> $GITHUB_OUTPUT; echo "tag_pfx=production" >> $GITHUB_OUTPUT ;;
            staging)     echo "ns=almyty-staging" >> $GITHUB_OUTPUT; echo "pfx=staging" >> $GITHUB_OUTPUT; echo "overlay=staging" >> $GITHUB_OUTPUT; echo "tag_pfx=staging" >> $GITHUB_OUTPUT ;;
            *)           echo "ns=almyty-dev" >> $GITHUB_OUTPUT; echo "pfx=dev" >> $GITHUB_OUTPUT; echo "overlay=development" >> $GITHUB_OUTPUT; echo "tag_pfx=dev" >> $GITHUB_OUTPUT ;;
          esac

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ steps.env.outputs.tag_pfx }}-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Update kustomize and deploy
        run: |
          cd k8s/overlays/${{ steps.env.outputs.overlay }}
          sed -i "s|newTag: .*|newTag: ${{ steps.tag.outputs.tag }}|g" kustomization.yaml
          kubectl apply -k .

      - name: Restart API
        run: |
          kubectl rollout restart deployment/${{ steps.env.outputs.pfx }}-api -n ${{ steps.env.outputs.ns }}
          kubectl rollout status deployment/${{ steps.env.outputs.pfx }}-api -n ${{ steps.env.outputs.ns }} --timeout=5m || true

      - name: Debug on failure
        if: failure()
        run: |
          NS="${{ steps.env.outputs.ns }}"
          PFX="${{ steps.env.outputs.pfx }}"
          kubectl get pods -n $NS -l app=${PFX}-api
          kubectl logs -n $NS -l app=${PFX}-api --tail=50 --all-containers 2>&1 || true
