name: API

on:
  push:
    branches: [development, staging]
    paths:
      - 'backend/**'
      - 'k8s/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      image_tag:
        description: 'Deploy existing image tag (skip build)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: api-${{ github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/frane/almyty

jobs:
  build:
    name: Build API
    runs-on: ubuntu-latest
    if: inputs.image_tag == ''
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/setup-buildx-action@v4

      - name: Resolve tag
        id: tag
        run: |
          case "${{ inputs.environment || github.ref_name }}" in
            production)  PREFIX="production" ;;
            staging)     PREFIX="staging" ;;
            *)           PREFIX="dev" ;;
          esac
          echo "tag=${PREFIX}-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/api:${{ steps.tag.outputs.prefix }}-latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  # Run pending migrations once, before the rollout. The app pods no longer
  # migrate on boot (DB_MIGRATIONS_RUN=false), so this single Job is the only
  # migrator — no replica race — and a failed migration fails this job, which
  # gates the deploy below (it won't roll out a schema-incompatible image).
  migrate:
    name: Migrate DB
    runs-on: ubuntu-latest
    needs: build
    if: always() && !failure()
    steps:
      - uses: actions/checkout@v6

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Resolve environment
        id: env
        run: |
          ENV="${{ inputs.environment || github.ref_name }}"
          case "$ENV" in
            production)  echo "ns=almyty-production" >> $GITHUB_OUTPUT; echo "pfx=prod" >> $GITHUB_OUTPUT; echo "tag=production-latest" >> $GITHUB_OUTPUT ;;
            staging)     echo "ns=almyty-staging" >> $GITHUB_OUTPUT; echo "pfx=staging" >> $GITHUB_OUTPUT; echo "tag=staging-latest" >> $GITHUB_OUTPUT ;;
            *)           echo "ns=almyty-dev" >> $GITHUB_OUTPUT; echo "pfx=dev" >> $GITHUB_OUTPUT; echo "tag=dev-latest" >> $GITHUB_OUTPUT ;;
          esac

      - name: Ensure pull secret exists
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=frane \
            --docker-password=${{ secrets.GHCR_PAT }} \
            --namespace=${{ steps.env.outputs.ns }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Run migration job
        run: |
          NS="${{ steps.env.outputs.ns }}"
          PFX="${{ steps.env.outputs.pfx }}"
          IMAGE_TAG="${{ steps.env.outputs.tag }}"

          # Migrate against the same image the rollout will run.
          # Secrets are unprefixed (almyty-secrets); configmaps are prefixed.
          kubectl delete job ${PFX}-db-migration -n $NS --ignore-not-found

          cat k8s/base/migration-job.yaml | \
            sed "s|image: ghcr.io/frane/almyty/api:latest|image: ghcr.io/frane/almyty/api:${IMAGE_TAG}|g" | \
            sed "s|name: db-migration|name: ${PFX}-db-migration|g" | \
            sed "s|name: almyty-config|name: ${PFX}-almyty-config|g" | \
            kubectl apply -n $NS -f -

          echo "Waiting for migration to complete..."
          kubectl wait --for=condition=complete job/${PFX}-db-migration -n $NS --timeout=180s || true

          echo "=== Migration logs ==="
          kubectl logs job/${PFX}-db-migration -n $NS || true

          STATUS=$(kubectl get job ${PFX}-db-migration -n $NS -o jsonpath='{.status.succeeded}')
          if [ "$STATUS" = "1" ]; then
            echo "Migration completed successfully"
          else
            echo "Migration failed — aborting before rollout"
            exit 1
          fi

  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: [build, migrate]
    if: always() && !failure()
    steps:
      - uses: actions/checkout@v6

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Resolve environment
        id: env
        run: |
          ENV="${{ inputs.environment || github.ref_name }}"
          case "$ENV" in
            production)  echo "ns=almyty-production" >> $GITHUB_OUTPUT; echo "pfx=prod" >> $GITHUB_OUTPUT; echo "overlay=production" >> $GITHUB_OUTPUT; echo "tag_pfx=production" >> $GITHUB_OUTPUT ;;
            staging)     echo "ns=almyty-staging" >> $GITHUB_OUTPUT; echo "pfx=staging" >> $GITHUB_OUTPUT; echo "overlay=staging" >> $GITHUB_OUTPUT; echo "tag_pfx=staging" >> $GITHUB_OUTPUT ;;
            *)           echo "ns=almyty-dev" >> $GITHUB_OUTPUT; echo "pfx=dev" >> $GITHUB_OUTPUT; echo "overlay=development" >> $GITHUB_OUTPUT; echo "tag_pfx=dev" >> $GITHUB_OUTPUT ;;
          esac

      - name: Apply kustomize manifests
        run: |
          kubectl apply -k k8s/overlays/${{ steps.env.outputs.overlay }}

      - name: Restart API
        run: |
          kubectl rollout restart deployment/${{ steps.env.outputs.pfx }}-api -n ${{ steps.env.outputs.ns }}
          # No '|| true': a CrashLooping rollout must fail this job loudly instead
          # of leaving the old ReplicaSet serving while the workflow reports green.
          kubectl rollout status deployment/${{ steps.env.outputs.pfx }}-api -n ${{ steps.env.outputs.ns }} --timeout=5m

      - name: Debug on failure
        if: failure()
        run: |
          NS="${{ steps.env.outputs.ns }}"
          PFX="${{ steps.env.outputs.pfx }}"
          kubectl get pods -n $NS -l app=${PFX}-api
          kubectl logs -n $NS -l app=${PFX}-api --tail=50 --all-containers 2>&1 || true
