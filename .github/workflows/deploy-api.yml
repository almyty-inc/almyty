name: Deploy API (Quick)

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/frane/almyty
  TAG: staging-${{ github.sha }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build and Deploy API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ env.TAG }}
            ${{ env.REGISTRY }}/api:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Deploy API to staging
        run: |
          kubectl set image deployment/staging-api \
            api=${{ env.REGISTRY }}/api:${{ env.TAG }} \
            -n almyty-staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/staging-api -n almyty-staging --timeout=5m
