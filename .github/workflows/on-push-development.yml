name: Development

on:
  push:
    branches: [development]

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-development
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/frane/almyty
  TAG: dev-${{ github.sha }}

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and push API
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ env.TAG }}
            ${{ env.REGISTRY }}/api:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api.dev.almyty.com
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ env.TAG }}
            ${{ env.REGISTRY }}/frontend:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Run migration
        run: |
          kubectl create namespace almyty-dev --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_PAT }} \
            --namespace=almyty-dev \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl delete job dev-db-migration -n almyty-dev --ignore-not-found

          cat k8s/base/migration-job.yaml | \
            sed "s|image: ghcr.io/frane/almyty/api:latest|image: ${{ env.REGISTRY }}/api:${{ env.TAG }}|g" | \
            sed "s|name: db-migration|name: dev-db-migration|g" | \
            sed "s|name: almyty-config|name: dev-almyty-config|g" | \
            kubectl apply -n almyty-dev -f -

          kubectl wait --for=condition=complete job/dev-db-migration -n almyty-dev --timeout=120s || true
          kubectl logs job/dev-db-migration -n almyty-dev || true

  deploy:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build, migrate]
    steps:
      - uses: actions/checkout@v6

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Create secrets
        run: |
          kubectl create namespace almyty-dev --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic almyty-secrets \
            --from-literal=DATABASE_USERNAME=${{ secrets.STAGING_DATABASE_USERNAME }} \
            --from-literal=DATABASE_PASSWORD=${{ secrets.STAGING_DATABASE_PASSWORD }} \
            --from-literal=DATABASE_URL=${{ secrets.DEV_DATABASE_URL }} \
            --from-literal=REDIS_PASSWORD="" \
            --from-literal=REDIS_URL="redis://dev-almyty-redis:6379" \
            --from-literal=JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }} \
            --from-literal=ENCRYPTION_KEY=${{ secrets.DEV_ENCRYPTION_KEY }} \
            --from-literal=RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} \
            --namespace=almyty-dev \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update image tags and deploy
        run: |
          cd k8s/overlays/development
          sed -i "s/newTag: dev-.*/newTag: ${{ env.TAG }}/g" kustomization.yaml
          kubectl apply -k .

      - name: Restart and wait
        run: |
          kubectl rollout restart deployment/dev-api -n almyty-dev
          kubectl rollout restart deployment/dev-frontend -n almyty-dev
          kubectl rollout status deployment/dev-api -n almyty-dev --timeout=5m || true
          kubectl rollout status deployment/dev-frontend -n almyty-dev --timeout=5m || true

      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -n almyty-dev -l "app in (dev-api,dev-frontend)"
          kubectl logs -n almyty-dev -l app=dev-api --tail=50 --all-containers 2>&1 || true
