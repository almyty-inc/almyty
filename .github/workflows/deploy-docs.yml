name: Deploy Docs (Quick)

on:
  workflow_dispatch:
  push:
    branches: [development, staging]
    paths:
      - 'docs-site/**'

env:
  REGISTRY: ghcr.io/frane/almyty

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docs image
        uses: docker/build-push-action@v5
        with:
          context: ./docs-site
          push: true
          tags: ${{ env.REGISTRY }}/docs:latest,${{ env.REGISTRY }}/docs:${{ github.sha }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Deploy to K8s
        run: |
          kubectl apply -f k8s/docs-deployment.yaml
          kubectl rollout restart deployment/docs -n almyty-staging
          kubectl rollout status deployment/docs -n almyty-staging --timeout=3m
