name: CI

# Runs the full test suite on every push to a feature branch and on
# every PR targeting master. Prior to this workflow there were deploy
# pipelines but NO test pipeline — PRs could land on master without
# anything verifying the 4,000+ tests still pass. That was a gap
# worth closing before the first external contributor lands.
#
# Three jobs run in parallel:
#
#   backend-tests         Backend unit + integration. Includes the
#                         DB-gated specs (bump-stats, cross-tenant
#                         isolation) via a Postgres 16 service
#                         container. RUN_DB_INTEGRATION=1 flips the
#                         describeIfDb gate so those specs exercise
#                         real SQL instead of being skipped.
#
#   frontend-tests        Vitest unit tests for the React app.
#
#   typecheck             Fast tsc --noEmit against the backend. Catches
#                         signature drift bugs (e.g. the ApisService
#                         findOne(id) → findOne(id, organizationId)
#                         refactor that broke every caller) before the
#                         full test suite even starts.

on:
  push:
    branches-ignore:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

# Cancel in-flight runs on the same ref — saves CI minutes on rapid
# force-pushes while a PR is being iterated.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend: unit + DB integration ──────────────────────────
  backend-tests:
    name: Backend tests (unit + DB integration)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: almyty_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --ignore-scripts

      # The DB integration specs use spec-specific Postgres schemas
      # so parallel Jest workers don't collide on DROP TABLE cycles.
      # Create them up front — TypeORM's `schema` option assumes the
      # schema already exists.
      - name: Pre-create integration test schemas
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d almyty_test -c \
            "CREATE SCHEMA IF NOT EXISTS bump_stats_test; CREATE SCHEMA IF NOT EXISTS cross_tenant_test;"

      - name: Run backend tests (unit + DB integration)
        working-directory: backend
        env:
          RUN_DB_INTEGRATION: '1'
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: '5432'
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: almyty_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: '6379'
        run: npm test -- --forceExit

  # ─── Frontend: vitest unit tests ─────────────────────────────
  frontend-tests:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Run vitest
        working-directory: frontend
        run: npm test -- --run

  # ─── Typecheck (fast, independent of tests) ──────────────────
  typecheck:
    name: Typecheck (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --ignore-scripts

      - name: tsc --noEmit
        working-directory: backend
        run: npx tsc --noEmit

  # ─── Dependency vulnerability scan (npm audit) ───────────────
  # Fails the PR if npm audit finds a high- or critical-severity
  # advisory in backend/ or frontend/ dependencies. `--audit-level=high`
  # means we tolerate low/moderate advisories (too noisy to hard-fail
  # on) but refuse to ship high or worse.
  #
  # Each subproject gets its own job because they have separate
  # package-lock.json files and different fix cadences. backend +
  # frontend are HARD-BLOCKERS (merge is refused on high/critical).
  # docs-site is a WARN-ONLY scan for the time being because its
  # remaining high-severity advisories require major-version bumps
  # of next/nextra that demand a coordinated rewrite — the docs
  # site serves only our own MDX content (no user-provided input)
  # so the next-mdx-remote RCE advisory isn't exploitable, and the
  # Next.js DoS advisories land behind a static-site deploy where
  # the DoS vectors are rate-limited at the nginx-ingress layer.
  npm-audit-backend:
    name: npm audit (backend — hard-block)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: npm audit backend
        working-directory: backend
        run: npm audit --audit-level=high --omit=dev

  npm-audit-frontend:
    name: npm audit (frontend — hard-block)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: npm audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

  npm-audit-docs:
    name: npm audit (docs-site — warn only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # WARN only — see the docstring on npm-audit-backend for why.
    # Track issues: next 14 → 15+, nextra 2 → 4 major upgrades.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json
      - name: npm audit docs-site
        working-directory: docs-site
        run: npm audit --audit-level=high --omit=dev

  # ─── Container image vulnerability scan (Trivy) ──────────────
  # Builds the backend + frontend production images and scans each
  # with Trivy for OS-package (apk) + Node library vulnerabilities.
  #
  # HARD-FAIL only on CRITICAL + unpatched. Base Alpine + Node +
  # nginx images consistently ship with HIGH-severity libcrypto /
  # busybox / zlib CVEs that get fixed in the NEXT upstream release
  # — blocking every PR on something we can't patch ourselves is
  # noise. `ignore-unfixed: true` skips advisories where no fix
  # version is published yet.
  #
  # The HIGH + MEDIUM scan still runs (as a separate step with
  # `exit-code: '0'`) so the findings show up in the action logs
  # for auditing, even though they don't block the build.
  container-scan:
    name: Container vulnerability scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Build failures also shouldn't block PRs while we iterate on
    # the workflow — mark this whole job as warn-only until the
    # upstream base image CVE churn settles down. The deploy
    # workflows can pin a specific image digest if we need
    # stronger runtime guarantees.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --target production -t almyty-api:ci ./backend

      - name: Trivy — backend CRITICAL (hard-fail on fixable)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'almyty-api:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Trivy — backend HIGH (warn-only, reporting)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'almyty-api:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH'

      - name: Build frontend image
        run: docker build --target production -t almyty-frontend:ci ./frontend

      - name: Trivy — frontend CRITICAL (hard-fail on fixable)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'almyty-frontend:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Trivy — frontend HIGH (warn-only, reporting)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'almyty-frontend:ci'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH'

  # ─── CodeQL static analysis ──────────────────────────────────
  # GitHub's SAST scanner — catches common JavaScript/TypeScript
  # security bugs (SQL injection shapes, unsanitised HTML, weak
  # crypto, etc.) as part of the PR check. Results land in the
  # Security tab of the repo.
  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ─── Secret scanning (gitleaks) ──────────────────────────────
  # Scans the entire commit history + working tree for accidentally
  # committed secrets: AWS access keys, GCP service account
  # credentials, GitHub personal access tokens, Stripe keys, JWT
  # secrets, generic "password = 'foo'" patterns. Uses the default
  # gitleaks ruleset which has ~200 regex+entropy rules tuned to
  # low false-positive rates.
  #
  # This catches the class of bug where someone copy-pastes a
  # production secret into a test file or commits a .env file. The
  # entire JWT rotation + httpOnly cookie hardening from earlier
  # commits is defeated if the JWT_SECRET ever lands in git.
  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history — gitleaks needs every commit to catch a
          # secret introduced and later removed.
          fetch-depth: 0

      - name: Run gitleaks
        # Scan only the working tree (`--no-git`) instead of the
        # full commit history. Historical commits may contain
        # legitimate-at-the-time dev fallback strings that
        # gitleaks would re-flag on every PR; catching new
        # secrets as they land is the useful signal for a CI
        # gate. A separate one-shot cleanup pass can sweep the
        # history independently.
        #
        # Pin the image to a specific version rather than :latest
        # so a silent upstream regex update can't start flagging
        # every PR overnight.
        #
        # `--config=/repo/.gitleaks.toml` loads the project
        # allowlist — without it the scanner trips on the k8s
        # secret.yaml templates + test-fixture fallback strings.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:v8.18.4 \
            detect \
              --source=/repo \
              --config=/repo/.gitleaks.toml \
              --no-git \
              --verbose \
              --redact \
              --no-banner \
              --exit-code=1
