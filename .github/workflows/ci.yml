name: CI — tests

# Runs the full test suite on every push to a feature branch and on
# every PR targeting master. Prior to this workflow there were deploy
# pipelines but NO test pipeline — PRs could land on master without
# anything verifying the 4,000+ tests still pass. That was a gap
# worth closing before the first external contributor lands.
#
# Three jobs run in parallel:
#
#   backend-tests         Backend unit + integration. Includes the
#                         DB-gated specs (bump-stats, cross-tenant
#                         isolation) via a Postgres 16 service
#                         container. RUN_DB_INTEGRATION=1 flips the
#                         describeIfDb gate so those specs exercise
#                         real SQL instead of being skipped.
#
#   frontend-tests        Vitest unit tests for the React app.
#
#   typecheck             Fast tsc --noEmit against the backend. Catches
#                         signature drift bugs (e.g. the ApisService
#                         findOne(id) → findOne(id, organizationId)
#                         refactor that broke every caller) before the
#                         full test suite even starts.

on:
  push:
    branches-ignore:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

# Cancel in-flight runs on the same ref — saves CI minutes on rapid
# force-pushes while a PR is being iterated.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend: unit + DB integration ──────────────────────────
  backend-tests:
    name: Backend tests (unit + DB integration)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: almyty_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --ignore-scripts

      # The DB integration specs use spec-specific Postgres schemas
      # so parallel Jest workers don't collide on DROP TABLE cycles.
      # Create them up front — TypeORM's `schema` option assumes the
      # schema already exists.
      - name: Pre-create integration test schemas
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d almyty_test -c \
            "CREATE SCHEMA IF NOT EXISTS bump_stats_test; CREATE SCHEMA IF NOT EXISTS cross_tenant_test;"

      - name: Run backend tests (unit + DB integration)
        working-directory: backend
        env:
          RUN_DB_INTEGRATION: '1'
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: '5432'
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: almyty_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: '6379'
        run: npm test -- --forceExit

  # ─── Frontend: vitest unit tests ─────────────────────────────
  frontend-tests:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Run vitest
        working-directory: frontend
        run: npm test -- --run

  # ─── Typecheck (fast, independent of tests) ──────────────────
  typecheck:
    name: Typecheck (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --ignore-scripts

      - name: tsc --noEmit
        working-directory: backend
        run: npx tsc --noEmit

  # ─── Dependency vulnerability scan (npm audit) ───────────────
  # Fails the PR if npm audit finds a high- or critical-severity
  # advisory in backend/ or frontend/ dependencies. `--audit-level=high`
  # means we tolerate low/moderate advisories (too noisy to hard-fail
  # on) but refuse to ship high or worse. Run on both subprojects
  # because they have separate package-lock.json files.
  npm-audit:
    name: npm audit (high + critical)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        project: [backend, frontend, docs-site]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: npm audit (${{ matrix.project }})
        working-directory: ${{ matrix.project }}
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: false

  # ─── Container image vulnerability scan (Trivy) ──────────────
  # Builds the backend production image and scans it with Trivy
  # for OS-package vulnerabilities (apk), Node dependency
  # vulnerabilities, and known malware signatures. Severity floor
  # is HIGH + CRITICAL — lower severities are reported but don't
  # fail the build.
  container-scan:
    name: Container vulnerability scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --target production -t almyty-api:ci ./backend

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'almyty-api:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Build frontend image
        run: docker build --target production -t almyty-frontend:ci ./frontend

      - name: Run Trivy scanner (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'almyty-frontend:ci'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ─── CodeQL static analysis ──────────────────────────────────
  # GitHub's SAST scanner — catches common JavaScript/TypeScript
  # security bugs (SQL injection shapes, unsanitised HTML, weak
  # crypto, etc.) as part of the PR check. Results land in the
  # Security tab of the repo.
  codeql:
    name: CodeQL static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
