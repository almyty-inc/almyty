name: CI

# Runs the full test suite on every push to development and on every
# PR targeting a protected branch (development, staging, master), so
# nothing merges into a promotion branch without the 4,000+ tests,
# typecheck, and audit passing first. Prior to this workflow there
# were deploy pipelines but NO test pipeline — code could land
# unverified. That was a gap worth closing before the first external
# contributor lands.
#
# Three jobs run in parallel:
#
#   backend-tests         Backend unit + integration. Includes the
#                         DB-gated specs (bump-stats, cross-tenant
#                         isolation) via a Postgres 16 service
#                         container. RUN_DB_INTEGRATION=1 flips the
#                         describeIfDb gate so those specs exercise
#                         real SQL instead of being skipped.
#
#   frontend-tests        Vitest unit tests for the React app.
#
#   typecheck             Fast tsc --noEmit against the backend. Catches
#                         signature drift bugs (e.g. the ApisService
#                         findOne(id) → findOne(id, organizationId)
#                         refactor that broke every caller) before the
#                         full test suite even starts.

on:
  push:
    branches: [development]
  pull_request:
    branches: [development, staging, master]
  workflow_call:
  workflow_dispatch:

# Cancel in-flight runs on the same ref — saves CI minutes on rapid
# force-pushes while a PR is being iterated.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Detect which areas changed ──────────────────────────────
  # Gates the heavy per-area jobs so a frontend-only PR doesn't spin
  # up the backend + Postgres + Redis integration suite (and vice
  # versa). Any change to this workflow itself flips every area true,
  # so CI changes are always fully exercised. Uses dorny/paths-filter
  # (already a pinned action in this repo).
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # paths-filter lists a PR's changed files via the API on
    # pull_request events, which needs pull-requests:read (the default
    # token is contents:read only -> "Resource not accessible").
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Filter paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs-site/**'
              - '.github/workflows/ci.yml'

  # ─── Backend: unit + DB integration ──────────────────────────
  backend-tests:
    name: Backend tests (unit + DB integration)
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        # pgvector image keeps Postgres 16 base + ships the `vector`
        # extension files so the canonical-memory migration can
        # CREATE EXTENSION at integration-test time. Plain alpine
        # doesn't carry pgvector; staging managed Postgres does.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: almyty_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --ignore-scripts --legacy-peer-deps

      # The DB integration specs use spec-specific Postgres schemas
      # so parallel Jest workers don't collide on DROP TABLE cycles.
      # Create them up front — TypeORM's `schema` option assumes the
      # schema already exists.
      - name: Pre-create integration test schemas
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d almyty_test -c \
            "CREATE SCHEMA IF NOT EXISTS bump_stats_test; CREATE SCHEMA IF NOT EXISTS cross_tenant_test; CREATE SCHEMA IF NOT EXISTS canonical_memory_test; CREATE SCHEMA IF NOT EXISTS gateway_runs_test; CREATE SCHEMA IF NOT EXISTS mcp_oauth_test; CREATE SCHEMA IF NOT EXISTS oauth_discovery_test;"
          psql -h 127.0.0.1 -U postgres -d almyty_test -c \
            "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pg_trgm; CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"

      - name: Run backend tests (unit + DB integration)
        working-directory: backend
        env:
          RUN_DB_INTEGRATION: '1'
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: '5432'
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: almyty_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: '6379'
        run: npm test -- --forceExit

  # ─── Frontend: vitest unit tests ─────────────────────────────
  frontend-tests:
    name: Frontend tests (vitest)
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Run vitest
        working-directory: frontend
        run: npm test -- --run

  # ─── Typecheck (fast, independent of tests) ──────────────────
  typecheck:
    name: Typecheck (backend)
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: tsc --noEmit
        working-directory: backend
        run: npx tsc --noEmit

      # The EE overlay (backend/ee + tsconfig.ee.json) is not covered by
      # the plain tsc run above, so a broken overlay used to surface
      # only at deploy time. Compile it here so it fails CI instead.
      - name: Build EE overlay
        working-directory: backend
        run: npm run build:ee

      # Require-cycle DI smoke over the compiled EE assembly: a class left
      # undefined at decoration time boots into CrashLoopBackOff (it did —
      # PromotedSkillsService after the EE relocation) while compiling fine.
      - name: EE DI smoke
        working-directory: backend
        run: node scripts/ee-di-smoke.js

  # ─── Dependency vulnerability scan (npm audit) ───────────────
  # Fails the PR if npm audit finds a high- or critical-severity
  # advisory in backend/ or frontend/ dependencies. `--audit-level=high`
  # means we tolerate low/moderate advisories (too noisy to hard-fail
  # on) but refuse to ship high or worse.
  #
  # Each subproject gets its own job because they have separate
  # package-lock.json files and different fix cadences. backend +
  # frontend are HARD-BLOCKERS (merge is refused on high/critical).
  # docs-site is a WARN-ONLY scan for the time being because its
  # remaining high-severity advisories require major-version bumps
  # of next/nextra that demand a coordinated rewrite — the docs
  # site serves only our own MDX content (no user-provided input)
  # so the next-mdx-remote RCE advisory isn't exploitable, and the
  # Next.js DoS advisories land behind a static-site deploy where
  # the DoS vectors are rate-limited at the nginx-ingress layer.
  npm-audit-backend:
    name: npm audit (backend — hard-block)
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: npm audit backend
        working-directory: backend
        run: npm audit --audit-level=high --omit=dev

  npm-audit-frontend:
    name: npm audit (frontend — hard-block)
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: npm audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

  npm-audit-docs:
    name: npm audit (docs-site — warn only)
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # WARN only — see the docstring on npm-audit-backend for why.
    # Track issues: next 14 → 15+, nextra 2 → 4 major upgrades.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json
      - name: npm audit docs-site
        working-directory: docs-site
        run: npm audit --audit-level=high --omit=dev

  # ─── Secret scanning (gitleaks) ──────────────────────────────
  # Scans the working tree for accidentally committed secrets: AWS
  # access keys, GCP service account credentials, GitHub personal
  # access tokens, Stripe keys, JWT secrets, generic "password =
  # 'foo'" patterns. Uses the default gitleaks ruleset plus the
  # project's .gitleaks.toml allowlist.
  #
  # This catches the class of bug where someone copy-pastes a
  # production secret into a test file or commits a .env file. The
  # entire JWT rotation + httpOnly cookie hardening from earlier
  # commits is defeated if the JWT_SECRET ever lands in git.
  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run gitleaks
        # Scan only the working tree (`--no-git`) instead of the
        # full commit history. Historical commits may contain
        # legitimate-at-the-time dev fallback strings that
        # gitleaks would re-flag on every PR; catching new
        # secrets as they land is the useful signal for a CI
        # gate. A separate one-shot cleanup pass can sweep the
        # history independently.
        #
        # Pin the image to a specific version rather than :latest
        # so a silent upstream regex update can't start flagging
        # every PR overnight.
        #
        # `--config=/repo/.gitleaks.toml` loads the project
        # allowlist — without it the scanner trips on the k8s
        # secret.yaml templates + test-fixture fallback strings.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:v8.18.4 \
            detect \
              --source=/repo \
              --config=/repo/.gitleaks.toml \
              --no-git \
              --verbose \
              --redact \
              --no-banner \
              --exit-code=1
