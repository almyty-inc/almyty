name: Build & Publish Images

# Builds multi-arch container images and publishes them to Docker Hub
# (public: almyty/api, almyty/frontend, almyty/docs), then fires a
# repository_dispatch to almyty-inc/infra to roll out the new tag.
#
# This runs alongside the legacy GHCR deploy-api/frontend/docs workflows
# until cutover — it does NOT deploy to the cluster itself.

on:
  push:
    branches: [development, staging, master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-publish-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  meta:
    name: Resolve metadata
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.m.outputs.environment }}
      env_prefix: ${{ steps.m.outputs.env_prefix }}
      sha_tag: ${{ steps.m.outputs.sha_tag }}
      latest_tag: ${{ steps.m.outputs.latest_tag }}
      is_branch: ${{ steps.m.outputs.is_branch }}
      api_url: ${{ steps.m.outputs.api_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tags
        id: m
        run: |
          # Canonical tag scheme (all images: api/frontend/docs/almyty):
          #   moving env tag       = <pfx>            (dev|staging|prod)
          #   immutable build tag  = <pfx>-<shortsha> (12-char sha)
          # `latest` is NOT published here — it means "newest stable release"
          # and is minted only by release.yml on v* tags.
          # API_URL is baked into the frontend at build time (VITE_API_BASE_URL).
          # Missing it = the SPA calls http://localhost:3000 and prod login breaks.
          case "${{ github.ref_name }}" in
            master)      ENV=production;  PFX=prod;    API_URL="https://api.almyty.com" ;;
            staging)     ENV=staging;     PFX=staging; API_URL="https://api.staging.almyty.com" ;;
            development) ENV=development;  PFX=dev;     API_URL="https://api.dev.almyty.com" ;;
            *)           ENV=development;  PFX=dev;     API_URL="https://api.dev.almyty.com" ;;
          esac
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "env_prefix=$PFX" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${PFX}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${PFX}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref_type }}" = "branch" ]; then
            echo "is_branch=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_branch=false" >> "$GITHUB_OUTPUT"
          fi

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.f.outputs.backend }}
      frontend: ${{ steps.f.outputs.frontend }}
      docs: ${{ steps.f.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: f
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'k8s/**'
            frontend:
              - 'frontend/**'
            docs:
              - 'docs-site/**'

  build-api:
    name: Build & push api
    runs-on: ubuntu-latest
    needs: [meta, changes]
    # Always build on tag pushes / manual dispatch; on branch pushes only
    # when backend or k8s changed.
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            almyty/api:${{ needs.meta.outputs.sha_tag }}
            almyty/api:${{ needs.meta.outputs.latest_tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  build-frontend:
    name: Build & push frontend
    runs-on: ubuntu-latest
    needs: [meta, changes]
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ needs.meta.outputs.api_url }}
            VITE_POSTHOG_KEY=${{ vars.VITE_POSTHOG_KEY || 'phc_wLKPNJ2JTUp7vbdjPKXcieuA6vJrjjDSib4HrSNzfV4e' }}
            VITE_POSTHOG_HOST=/ingest
            VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN }}
            VITE_TURNSTILE_SITE_KEY=${{ vars.VITE_TURNSTILE_SITE_KEY }}
          tags: |
            almyty/frontend:${{ needs.meta.outputs.sha_tag }}
            almyty/frontend:${{ needs.meta.outputs.latest_tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  build-docs:
    name: Build & push docs
    runs-on: ubuntu-latest
    needs: [meta, changes]
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.docs == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: ./docs-site
          file: ./docs-site/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            almyty/docs:${{ needs.meta.outputs.sha_tag }}
            almyty/docs:${{ needs.meta.outputs.latest_tag }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,scope=docs,mode=max

  build-almyty:
    name: Build & push almyty (single self-host image)
    runs-on: ubuntu-latest
    needs: [meta, changes]
    # Self-hosters consume the all-in-one via tagged releases (release.yml also
    # builds it on v* tags), so it does NOT need to build on every branch push
    # and must stay OFF the deploy critical path (it's slow: frontend+backend,
    # multi-arch). Build it only on tag pushes and manual dispatch.
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.allinone
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            almyty/almyty:${{ needs.meta.outputs.sha_tag }}
            almyty/almyty:${{ needs.meta.outputs.latest_tag }}
          cache-from: type=gha,scope=almyty
          cache-to: type=gha,scope=almyty,mode=max

  dispatch-deploy:
    name: Dispatch deploy to infra
    runs-on: ubuntu-latest
    # Only on branch pushes (the env→branch mapping); tags publish images
    # but production rollout of a release is intentionally manual.
    #
    # Fire ONLY when at least one image was actually built+pushed this run.
    # A push touching no backend/frontend/docs code skips every build job; we
    # must NOT dispatch a deploy for an image tag that was never built (infra
    # would then fail pulling a non-existent tag). `always()` keeps this job
    # evaluating even though some needed build jobs are skipped.
    #
    # NOTE: build-almyty is intentionally NOT a dependency here. The all-in-one
    # image is slow to build and only ships to self-hosters via releases; the
    # SaaS rollout only pulls the api + frontend images, so it must not wait on
    # build-almyty. That job keeps building independently off the critical path.
    needs: [meta, build-api, build-frontend, build-docs]
    if: |
      always() &&
      needs.meta.outputs.is_branch == 'true' &&
      github.ref_type == 'branch' &&
      (
        needs.build-api.result == 'success' ||
        needs.build-frontend.result == 'success' ||
        needs.build-docs.result == 'success'
      )
    steps:
      - name: Fire repository_dispatch
        env:
          GH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          ENVIRONMENT: ${{ needs.meta.outputs.environment }}
          IMAGE_TAG: ${{ needs.meta.outputs.sha_tag }}
        run: |
          gh api repos/almyty-inc/infra/dispatches \
            -f event_type=deploy \
            -F client_payload[environment]="$ENVIRONMENT" \
            -F client_payload[image_tag]="$IMAGE_TAG"
