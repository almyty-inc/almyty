name: Release

# Tagged releases (v1.2.3). Builds multi-arch images, publishes them to
# Docker Hub as almyty/*:X.Y.Z and :latest, signs them with cosign
# (keyless / OIDC), attaches an SBOM, and records build provenance.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # required for cosign keyless signing (OIDC)

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: ./backend
            file: ./backend/Dockerfile
            target: production
          - image: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            target: production
          - image: docs
            context: ./docs-site
            file: ./docs-site/Dockerfile
            target: ''
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Build & push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: |
            almyty/${{ matrix.image }}:${{ steps.ver.outputs.version }}
            almyty/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "almyty/${{ matrix.image }}@${DIGEST}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: almyty/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.image }}.spdx.json

      - name: Attest SBOM
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.image }}.spdx.json \
            --type spdxjson \
            "almyty/${{ matrix.image }}@${DIGEST}"
