name: Release

# Tagged releases (v1.2.3). Builds multi-arch images, publishes them to
# Docker Hub as almyty/*:X.Y.Z and :latest, signs them with cosign
# (keyless / OIDC), attaches an SBOM, and records build provenance.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # required for cosign keyless signing (OIDC)

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: ./backend
            file: ./backend/Dockerfile
            target: production
          - image: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            target: production
          - image: almyty
            context: .
            file: ./Dockerfile.allinone
            target: ''
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: ver
        run: |
          # Semver from the tag: v1.2.3 -> 1.2.3, 1.2, 1 (+ latest).
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION#*.}"; MINOR="${MINOR%%.*}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "minor=${MAJOR}.${MINOR}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          # Frontend needs these baked in at build time (only the frontend
          # Dockerfile consumes them; other images ignore them). Releases are
          # production, so point the SPA at the prod API — WITHOUT this the
          # bundle defaults to http://localhost:3000 and prod login/reset break.
          build-args: |
            VITE_API_BASE_URL=https://api.almyty.com
            VITE_POSTHOG_KEY=${{ vars.VITE_POSTHOG_KEY }}
            VITE_POSTHOG_HOST=/ingest
            VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN }}
            VITE_TURNSTILE_SITE_KEY=${{ vars.VITE_TURNSTILE_SITE_KEY }}
          tags: |
            almyty/${{ matrix.image }}:${{ steps.ver.outputs.version }}
            almyty/${{ matrix.image }}:${{ steps.ver.outputs.minor }}
            almyty/${{ matrix.image }}:${{ steps.ver.outputs.major }}
            almyty/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          # provenance + sbom above are attached inside the image index
          # (verifiable via `docker buildx imagetools inspect`); they do NOT
          # create sha256-*.sig/.att tags. Cosign tag-signing was removed to
          # keep the tag list clean (moving + semver only).

  # Docs (Next.js/nextra) is built OUTSIDE the `release` matrix and off the
  # prod-deploy critical path: its static-generation workers crash under qemu
  # with SIGILL when arm64 is cross-built on an amd64 runner, and gating the
  # prod rollout on that flake once already skipped a release. Build each arch
  # natively (amd64 on ubuntu-latest, arm64 on the free public-repo
  # ubuntu-24.04-arm runner), push by digest, then stitch the semver tags.
  release-docs:
    name: Release docs (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: ./docs-site
          file: ./docs-site/Dockerfile
          platforms: linux/${{ matrix.platform }}
          provenance: true
          sbom: true
          outputs: type=image,name=almyty/docs,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docs-${{ matrix.platform }}
          cache-to: type=gha,scope=docs-${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: release-docs-digest-${{ matrix.platform }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  release-docs-manifest:
    name: Release docs (manifest)
    needs: release-docs
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION#*.}"; MINOR="${MINOR%%.*}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "minor=${MAJOR}.${MINOR}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: release-docs-digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push (all semver tags)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "almyty/docs:${VERSION}" \
            -t "almyty/docs:${MINOR}" \
            -t "almyty/docs:${MAJOR}" \
            -t "almyty/docs:latest" \
            $(printf 'almyty/docs@sha256:%s ' *)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          MINOR: ${{ steps.ver.outputs.minor }}
          MAJOR: ${{ steps.ver.outputs.major }}

  # Trigger the production rollout. This does NOT deploy — it only fires a
  # repository_dispatch at almyty-inc/infra, whose deploy.yml owns the actual
  # cluster rollout (migration, kubectl, smoke, rollback). Same pattern
  # build-publish.yml uses for dev/staging. We pass the semver tag so infra
  # pins almyty/api:<version> and kubectl shows the running version.
  #
  # Intentionally needs ONLY `release` (api/frontend/almyty), NOT release-docs:
  # prod pulls api + frontend, and gating the rollout on the docs image (a slow
  # flake-prone build) once already skipped a whole release.
  trigger-prod-deploy:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch production deploy to infra (by version tag)
        env:
          GH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Deploying production at almyty/*:${VERSION}"
          gh api repos/almyty-inc/infra/dispatches \
            -f event_type=deploy \
            -F client_payload[environment]="production" \
            -F client_payload[image_tag]="${VERSION}"

  # Create the GitHub Release object so tags self-document (release.yml
  # otherwise only publishes images). Idempotent — edits if it exists.
  github-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --generate-notes --latest
          else
            gh release create "$TAG" --title "$TAG" --generate-notes --latest --verify-tag
          fi
