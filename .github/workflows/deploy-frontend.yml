name: Frontend

on:
  push:
    branches: [development, staging]
    paths:
      - 'frontend/**'
      - 'k8s/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      image_tag:
        description: 'Deploy existing image tag (skip build)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: frontend-${{ github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/frane/almyty

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: inputs.image_tag == ''
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/setup-buildx-action@v4

      - name: Resolve tag
        id: tag
        run: |
          case "${{ inputs.environment || github.ref_name }}" in
            production)  PREFIX="production"; API_URL="https://api.almyty.com" ;;
            staging)     PREFIX="staging"; API_URL="https://api.staging.almyty.com" ;;
            *)           PREFIX="dev"; API_URL="https://api.dev.almyty.com" ;;
          esac
          echo "tag=${PREFIX}-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "prefix=${PREFIX}" >> $GITHUB_OUTPUT
          echo "api_url=${API_URL}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ steps.tag.outputs.api_url }}
            VITE_POSTHOG_KEY=${{ vars.VITE_POSTHOG_KEY || 'phc_wLKPNJ2JTUp7vbdjPKXcieuA6vJrjjDSib4HrSNzfV4e' }}
            VITE_POSTHOG_HOST=https://eu.i.posthog.com
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/frontend:${{ steps.tag.outputs.prefix }}-latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: build
    if: always() && !failure()
    steps:
      - uses: actions/checkout@v6

      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Resolve environment
        id: env
        run: |
          ENV="${{ inputs.environment || github.ref_name }}"
          case "$ENV" in
            production)  echo "ns=almyty-production" >> $GITHUB_OUTPUT; echo "pfx=prod" >> $GITHUB_OUTPUT ;;
            staging)     echo "ns=almyty-staging" >> $GITHUB_OUTPUT; echo "pfx=staging" >> $GITHUB_OUTPUT ;;
            *)           echo "ns=almyty-dev" >> $GITHUB_OUTPUT; echo "pfx=dev" >> $GITHUB_OUTPUT ;;
          esac

      - name: Restart Frontend
        run: |
          kubectl rollout restart deployment/${{ steps.env.outputs.pfx }}-frontend -n ${{ steps.env.outputs.ns }}
          kubectl rollout status deployment/${{ steps.env.outputs.pfx }}-frontend -n ${{ steps.env.outputs.ns }} --timeout=5m || true
