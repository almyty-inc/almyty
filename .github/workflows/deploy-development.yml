name: Deploy to Development

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/frane/almyty
  TAG: dev-${{ github.sha }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ env.TAG }}
            ${{ env.REGISTRY }}/api:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api.dev.almyty.com
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ env.TAG }}
            ${{ env.REGISTRY }}/frontend:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ secrets.DIGITALOCEAN_CLUSTER_NAME }}

      - name: Create ImagePullSecret for GHCR
        run: |
          kubectl create namespace almyty-dev --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_PAT }} \
            --namespace=almyty-dev \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create application secrets
        # Dev shares the staging Postgres + Redis credentials
        # (same DO managed cluster, same `doadmin` user) but
        # uses its own database name (`almyty_dev`) and its own
        # ENCRYPTION_KEY so credential rows are isolated from
        # staging at the application layer.
        run: |
          kubectl create secret generic almyty-secrets \
            --from-literal=DATABASE_USERNAME=${{ secrets.STAGING_DATABASE_USERNAME }} \
            --from-literal=DATABASE_PASSWORD=${{ secrets.STAGING_DATABASE_PASSWORD }} \
            --from-literal=DATABASE_URL=${{ secrets.DEV_DATABASE_URL }} \
            --from-literal=REDIS_PASSWORD="" \
            --from-literal=REDIS_URL="redis://dev-almyty-redis:6379" \
            --from-literal=JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }} \
            --from-literal=ENCRYPTION_KEY=${{ secrets.DEV_ENCRYPTION_KEY }} \
            --from-literal=RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} \
            --namespace=almyty-dev \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update image tags with git SHA
        run: |
          cd k8s/overlays/development
          sed -i "s/newTag: dev-.*/newTag: dev-${{ github.sha }}/g" kustomization.yaml
          cat kustomization.yaml

      - name: Deploy to development
        run: |
          kubectl apply -k k8s/overlays/development

      - name: Restart deployments to clear stuck rollouts
        run: |
          kubectl rollout restart deployment/dev-api -n almyty-dev
          kubectl rollout restart deployment/dev-frontend -n almyty-dev

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/dev-api -n almyty-dev --timeout=5m || true
          kubectl rollout status deployment/dev-frontend -n almyty-dev --timeout=5m || true

      - name: Debug pod status on failure
        if: failure()
        run: |
          kubectl get pods -n almyty-dev -l "app in (dev-api,dev-frontend)"
          echo "=== API pod logs ==="
          kubectl logs -n almyty-dev -l app=dev-api --tail=50 --all-containers 2>&1 || true

      - name: Deployment summary
        run: |
          echo "🚀 Deployed to development!"
          echo "📦 Version: dev-${{ github.sha }}"
          echo ""
          echo "🌐 URLs:"
          echo "  API: https://api.dev.almyty.com"
          echo "  App: https://app.dev.almyty.com"
