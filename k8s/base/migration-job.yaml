apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  labels:
    app: almyty
    component: migration
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: migration
          image: ghcr.io/frane/almyty/api:latest
          command: ["node", "-e"]
          args:
            - |
              const {DataSource} = require('typeorm');
              const path = require('path');
              const ds = new DataSource({
                type: 'postgres',
                host: process.env.DATABASE_HOST,
                port: parseInt(process.env.DATABASE_PORT || '5432'),
                username: process.env.DATABASE_USERNAME,
                password: process.env.DATABASE_PASSWORD,
                database: process.env.DATABASE_NAME,
                ssl: process.env.DB_SSL === 'true' ? {rejectUnauthorized: false} : false,
                entities: [path.join(__dirname, 'dist', 'entities', '*.entity.js')],
                migrations: [path.join(__dirname, 'dist', 'migrations', '*.js')],
                synchronize: false,
                migrationsRun: false,
                logging: true,
              });
              ds.initialize()
                .then(async () => {
                  console.log('Connected. Running pending migrations...');
                  try {
                    const result = await ds.runMigrations({ transaction: 'each' });
                    console.log('Migrations applied:', result.length);
                    result.forEach(m => console.log(' ✓', m.name));
                  } catch(e) {
                    // If migrations fail because schema was created by synchronize,
                    // seed the migrations table so future runs work correctly
                    if (e.message.includes('already exists') || e.message.includes('duplicate')) {
                      console.log('Schema exists (from synchronize). Seeding migrations table...');
                      const qr = ds.createQueryRunner();
                      const migrations = ds.migrations.map(m => m.constructor ? m.constructor.name : m.name);
                      for (const name of migrations) {
                        try {
                          await qr.query(
                            'INSERT INTO migrations (timestamp, name) VALUES ($1, $2) ON CONFLICT DO NOTHING',
                            [parseInt(name.match(/\d+/)?.[0] || '0'), name]
                          );
                          console.log(' ✓ Seeded:', name);
                        } catch(e2) { console.log(' ⚠ Skip:', name, e2.message); }
                      }
                      await qr.release();
                      console.log('Migration table seeded. Future runs will only apply new migrations.');
                    } else {
                      throw e;
                    }
                  }
                  const qr = ds.createQueryRunner();
                  const tables = await qr.query("SELECT tablename FROM pg_tables WHERE schemaname='public'");
                  console.log('Tables:', tables.length);
                  tables.forEach(t => console.log(' -', t.tablename));
                  await qr.release();
                  await ds.destroy();
                  console.log('Migration complete');
                  process.exit(0);
                })
                .catch(e => { console.error('Migration failed:', e.message); process.exit(1); });
          env:
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: almyty-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: almyty-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: almyty-config
                  key: DATABASE_NAME
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: almyty-secrets
                  key: DATABASE_USERNAME
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: almyty-secrets
                  key: DATABASE_PASSWORD
            - name: DB_SSL
              valueFrom:
                configMapKeyRef:
                  name: almyty-config
                  key: DB_SSL
