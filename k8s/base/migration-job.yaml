apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  labels:
    app: almyty
    component: migration
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: migration
          image: ghcr.io/frane/almyty/api:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Clearing stale migration records and running migrations..."
              node -e "
                const {Client} = require('pg');
                const c = new Client({
                  host: process.env.DATABASE_HOST,
                  port: parseInt(process.env.DATABASE_PORT),
                  user: process.env.DATABASE_USERNAME,
                  password: process.env.DATABASE_PASSWORD,
                  database: process.env.DATABASE_NAME,
                  ssl: process.env.DB_SSL === 'true' ? {rejectUnauthorized: false} : undefined,
                });
                (async () => {
                  await c.connect();
                  await c.query('DELETE FROM migrations');
                  console.log('Cleared migrations table');
                  await c.end();
                })().catch(e => console.log('Skip clear:', e.message));
              "
              node -e "const fs=require('fs'),p=require('path'); const d=p.resolve('dist/migrations'); console.log('dir exists:',fs.existsSync(d)); if(fs.existsSync(d)){console.log('files:',fs.readdirSync(d).filter(f=>f.endsWith('.js')).length)} const c=require('./dist/config/database.config.js'); console.log('opts.migrations:',c.AppDataSource.options.migrations);"
              ./node_modules/.bin/typeorm migration:run -d dist/config/database.config.js
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: almyty-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: almyty-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: almyty-config
                  key: DATABASE_NAME
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: almyty-secrets
                  key: DATABASE_USERNAME
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: almyty-secrets
                  key: DATABASE_PASSWORD
            - name: DB_SSL
              valueFrom:
                configMapKeyRef:
                  name: almyty-config
                  key: DB_SSL
