# This is a template - DO NOT commit real secrets to git
# Create the actual secret using: kubectl create secret generic almyty-secrets --from-literal=...
apiVersion: v1
kind: Secret
metadata:
  name: almyty-secrets
  namespace: almyty
type: Opaque
stringData:
  # Database credentials (replace with actual values)
  DATABASE_USERNAME: "postgres"
  DATABASE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

  # Redis password (optional, leave empty if no auth)
  REDIS_PASSWORD: ""

  # JWT Secret (generate with: openssl rand -base64 64)
  JWT_SECRET: "CHANGE_ME_GENERATE_STRONG_SECRET"

  # Database URL (constructed from above)
  DATABASE_URL: "postgresql://postgres:CHANGE_ME_IN_PRODUCTION@almyty-postgres:5432/almyty"

  # Redis URL
  REDIS_URL: "redis://almyty-redis:6379"

  # Credential encryption key (used by Credential entity to
  # encrypt config fields at rest in the DB). Required in
  # production — the backend HARD-FAILS at credential-operation
  # time if this is unset. Generate with:
  #   openssl rand -base64 48
  # Rotating this key invalidates every stored credential, so
  # treat it like a root key: back it up, limit access, and
  # never rotate without a re-encryption plan.
  ENCRYPTION_KEY: "CHANGE_ME_GENERATE_STRONG_ENCRYPTION_KEY"

  # Platform operator bearer token for /monitoring/metrics +
  # /monitoring/metrics/history + /monitoring/metrics/prometheus.
  # If unset, those endpoints fail closed (return 401 on every
  # request) which is the safe default. Generate with:
  #   openssl rand -base64 48
  # Configure Prometheus scrapers with
  #   authorization: Bearer <PLATFORM_METRICS_TOKEN>
  PLATFORM_METRICS_TOKEN: "CHANGE_ME_GENERATE_STRONG_SECRET"
