# This is a template - DO NOT commit real secrets to git
# Create the actual secret using: kubectl create secret generic apifai-secrets --from-literal=...
apiVersion: v1
kind: Secret
metadata:
  name: apifai-secrets
  namespace: apifai
type: Opaque
stringData:
  # Database credentials (replace with actual values)
  DATABASE_USERNAME: "postgres"
  DATABASE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

  # Redis password (optional, leave empty if no auth)
  REDIS_PASSWORD: ""

  # JWT Secret (generate with: openssl rand -base64 64)
  JWT_SECRET: "CHANGE_ME_GENERATE_STRONG_SECRET"

  # Database URL (constructed from above)
  DATABASE_URL: "postgresql://postgres:CHANGE_ME_IN_PRODUCTION@apifai-postgres:5432/apifai"

  # Redis URL
  REDIS_URL: "redis://apifai-redis:6379"
