apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: almyty
  labels:
    app: api
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        component: backend
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      # Pod-level security context. Forces every container in this
      # pod to run as a non-root user regardless of what the image
      # says, drops every Linux capability, and applies the default
      # seccomp profile. Matches the Kubernetes Pod Security
      # Standard "restricted" level — the baseline every production
      # workload should meet. Without these fields a compromised
      # container would run as root inside its PID namespace and
      # could exploit kernel bugs to escape to the host.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api
        image: ghcr.io/frane/almyty/api:latest
        imagePullPolicy: Always
        # Container-level hardening — tighter than the pod-level
        # defaults above. readOnlyRootFilesystem means the container
        # can't modify its own image layer at runtime (plant a
        # binary, rewrite configs, add a cron), which is the
        # typical first step of an RCE chain. Writable paths the
        # app actually needs (/tmp for jest/worker tmp files, and
        # /app/node_modules/.cache if present) are exposed via
        # emptyDir volumes below.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: DATABASE_URL
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: DATABASE_PORT
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: DATABASE_USERNAME
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: DATABASE_PASSWORD
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: DATABASE_NAME
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: REDIS_URL
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: REDIS_PORT
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: REDIS_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: JWT_SECRET
        - name: JWT_EXPIRES_IN
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: JWT_EXPIRES_IN
        - name: CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: CORS_ORIGIN
        - name: RATE_LIMIT_TTL
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: RATE_LIMIT_TTL
        - name: RATE_LIMIT_MAX
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: RATE_LIMIT_MAX
        - name: SWAGGER_ENABLED
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: SWAGGER_ENABLED
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: LOG_LEVEL
        - name: DB_SSL
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: DB_SSL
        - name: DB_SYNC
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: DB_SYNC
        - name: BASE_URL
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: BASE_URL
        - name: RESEND_API_KEY
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: RESEND_API_KEY
              optional: true
        - name: EMAIL_FROM
          value: "almyty <noreply@almyty.com>"
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: CORS_ORIGIN
        # Credential encryption key — REQUIRED in production. The
        # backend Credential entity hard-fails at credential-
        # operation time if this env var is unset. NOT marked
        # optional: true so kube-scheduler refuses the pod if
        # the secret key is missing, surfacing the misconfig
        # loudly at deploy time instead of silently breaking the
        # first credential operation later.
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: ENCRYPTION_KEY
        # Platform operator bearer token for the /monitoring/metrics
        # + /monitoring/metrics/history + /monitoring/metrics/prometheus
        # endpoints. Without this env var set, those endpoints
        # fail-closed and return 401 on every request (that's the
        # intentional default). Configure Prometheus scrapers with
        # `authorization: Bearer <PLATFORM_METRICS_TOKEN>`.
        - name: PLATFORM_METRICS_TOKEN
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: PLATFORM_METRICS_TOKEN
              optional: true
        # CORS allowlist env var — the new CORS config in main.ts
        # replaces the old `origin: true` wildcard with a concrete
        # allowlist derived from these fields. CORS_ALLOWED_ORIGINS
        # is optional (extra explicit entries) and FRONTEND_URL is
        # always included.
        - name: CORS_ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: CORS_ALLOWED_ORIGINS
              optional: true
        # V8 old-space defaults to ~1.5GB regardless of the cgroup
        # memory limit. Pin it just under the container limit so a
        # real-world OpenAPI parse (Stripe ~7.7 MB, 600+ ops) can
        # actually use the heap headroom we paid for. Container
        # limit is 4Gi; reserve ~500MB for native heap, buffers,
        # threads, etc.
        - name: NODE_OPTIONS
          value: "--max-old-space-size=3500"
        # Writable tmp dir for the sandbox workers, dependency
        # cache, etc. — readOnlyRootFilesystem above denies every
        # other write. Mounted as an emptyDir so it's tied to the
        # pod lifetime and disappears on restart (no cross-request
        # state leaks).
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            # 4Gi is the operating ceiling. Earlier we tried 8Gi but
            # the node pool can't schedule two 8Gi pods (FailedSchedul-
            # ing: Insufficient memory) — moving past 4Gi means
            # scaling the node pool first. Hold here and lean on the
            # parser-side memory fix (skip $ref dereferencing, drop
            # `originalSchema` retention) to keep peak usage well
            # under 4Gi for any spec under the 100MB ceiling.
            memory: "4Gi"
            cpu: "1000m"
      # emptyDir tmp volume — see the volumeMounts above for why.
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 1Gi
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        # Resource limits on init containers too — without these, a
        # hung init container can consume unbounded CPU/memory while
        # blocking the main container from starting.
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
        env:
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: DATABASE_PORT
        command:
        - sh
        - -c
        - |
          until pg_isready -h $DATABASE_HOST -p $DATABASE_PORT -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done
      - name: wait-for-redis
        image: redis:7-alpine
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
        env:
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: REDIS_HOST
        command:
        - sh
        - -c
        - |
          until redis-cli -h $REDIS_HOST ping; do
            echo "Waiting for redis..."
            sleep 2
          done
---
apiVersion: v1
kind: Service
metadata:
  name: almyty-api
  namespace: almyty
  labels:
    app: api
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: api
