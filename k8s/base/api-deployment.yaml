apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: almyty
  labels:
    app: api
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        component: backend
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      # Pod-level security context. Forces every container in this
      # pod to run as a non-root user regardless of what the image
      # says, drops every Linux capability, and applies the default
      # seccomp profile. Matches the Kubernetes Pod Security
      # Standard "restricted" level — the baseline every production
      # workload should meet. Without these fields a compromised
      # container would run as root inside its PID namespace and
      # could exploit kernel bugs to escape to the host.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api
        image: ghcr.io/frane/almyty/api:latest
        imagePullPolicy: Always
        # Container-level hardening — tighter than the pod-level
        # defaults above. readOnlyRootFilesystem means the container
        # can't modify its own image layer at runtime (plant a
        # binary, rewrite configs, add a cron), which is the
        # typical first step of an RCE chain. Writable paths the
        # app actually needs (/tmp for jest/worker tmp files, and
        # /app/node_modules/.cache if present) are exposed via
        # emptyDir volumes below.
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: DATABASE_URL
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: DATABASE_PORT
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: DATABASE_USERNAME
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: DATABASE_PASSWORD
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: DATABASE_NAME
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: REDIS_URL
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: REDIS_PORT
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: REDIS_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: JWT_SECRET
        - name: JWT_EXPIRES_IN
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: JWT_EXPIRES_IN
        - name: CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: CORS_ORIGIN
        - name: RATE_LIMIT_TTL
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: RATE_LIMIT_TTL
        - name: RATE_LIMIT_MAX
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: RATE_LIMIT_MAX
        - name: SWAGGER_ENABLED
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: SWAGGER_ENABLED
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: LOG_LEVEL
        - name: DB_SSL
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: DB_SSL
        - name: DB_SYNC
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: DB_SYNC
        - name: BASE_URL
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: BASE_URL
        - name: RESEND_API_KEY
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: RESEND_API_KEY
              optional: true
        - name: EMAIL_FROM
          value: "almyty <noreply@almyty.com>"
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: CORS_ORIGIN
        # Credential encryption key — REQUIRED in production. The
        # backend Credential entity hard-fails at credential-
        # operation time if this env var is unset. NOT marked
        # optional: true so kube-scheduler refuses the pod if
        # the secret key is missing, surfacing the misconfig
        # loudly at deploy time instead of silently breaking the
        # first credential operation later.
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: ENCRYPTION_KEY
        # Platform operator bearer token for the /monitoring/metrics
        # + /monitoring/metrics/history + /monitoring/metrics/prometheus
        # endpoints. Without this env var set, those endpoints
        # fail-closed and return 401 on every request (that's the
        # intentional default). Configure Prometheus scrapers with
        # `authorization: Bearer <PLATFORM_METRICS_TOKEN>`.
        - name: PLATFORM_METRICS_TOKEN
          valueFrom:
            secretKeyRef:
              name: almyty-secrets
              key: PLATFORM_METRICS_TOKEN
              optional: true
        # CORS allowlist env var — the new CORS config in main.ts
        # replaces the old `origin: true` wildcard with a concrete
        # allowlist derived from these fields. CORS_ALLOWED_ORIGINS
        # is optional (extra explicit entries) and FRONTEND_URL is
        # always included.
        - name: CORS_ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: CORS_ALLOWED_ORIGINS
              optional: true
        # V8 old-space defaults to ~1.5 GB regardless of the cgroup
        # memory limit. Pin it just under the container limit so a
        # rogue request can't get killed mid-allocation. Container
        # limit is 2Gi; reserve ~500 MB for native heap, buffers,
        # threads, V8 retained arenas. Real-world Stripe import
        # peaks at ~220 MB heap after the import refactor — this
        # is sized for headroom on 50 MB-class specs.
        - name: NODE_OPTIONS
          value: "--max-old-space-size=1500"
        # Writable tmp dir for the sandbox workers, dependency
        # cache, etc. — readOnlyRootFilesystem above denies every
        # other write. Mounted as an emptyDir so it's tied to the
        # pod lifetime and disappears on restart (no cross-request
        # state leaks).
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            # Sized against measured peaks after the schema-import
            # memory refactor (commit adff115). A real Stripe-class
            # OpenAPI import (7.4 MB / 587 ops / 1385 resources)
            # peaks at ~433 MB RSS on staging. 512Mi gives the
            # scheduler room to pack two replicas per node and
            # leaves ~80 MB headroom over steady-state idle (~200
            # MB) before active import work.
            memory: "512Mi"
            cpu: "250m"
          limits:
            # 2Gi is the operating ceiling — ~5x headroom over the
            # measured 433 MB peak so a single rogue request or a
            # 50 MB-class spec has room without OOM-killing. Was
            # 4Gi while we were chasing the OpenAPI parser leak;
            # post-fix the node pool packs better at 2Gi and we
            # can still size up if a 100 MB spec lands.
            memory: "2Gi"
            cpu: "1000m"
      # emptyDir tmp volume — see the volumeMounts above for why.
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 1Gi
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        # Resource limits on init containers too — without these, a
        # hung init container can consume unbounded CPU/memory while
        # blocking the main container from starting.
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
        env:
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: DATABASE_PORT
        command:
        - sh
        - -c
        - |
          until pg_isready -h $DATABASE_HOST -p $DATABASE_PORT -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done
      - name: wait-for-redis
        image: redis:7-alpine
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
        env:
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: almyty-config
              key: REDIS_HOST
        command:
        - sh
        - -c
        - |
          until redis-cli -h $REDIS_HOST ping; do
            echo "Waiting for redis..."
            sleep 2
          done
---
apiVersion: v1
kind: Service
metadata:
  name: almyty-api
  namespace: almyty
  labels:
    app: api
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: api
