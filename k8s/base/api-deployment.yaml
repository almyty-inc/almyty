apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: apifai
  labels:
    app: api
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        component: backend
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: api
        image: ghcr.io/frane/apifai/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: apifai-secrets
              key: DATABASE_URL
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: DATABASE_PORT
        - name: DATABASE_USERNAME
          valueFrom:
            secretKeyRef:
              name: apifai-secrets
              key: DATABASE_USERNAME
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: apifai-secrets
              key: DATABASE_PASSWORD
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: DATABASE_NAME
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: apifai-secrets
              key: REDIS_URL
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: REDIS_PORT
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: apifai-secrets
              key: REDIS_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: apifai-secrets
              key: JWT_SECRET
        - name: JWT_EXPIRES_IN
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: JWT_EXPIRES_IN
        - name: CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: CORS_ORIGIN
        - name: RATE_LIMIT_TTL
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: RATE_LIMIT_TTL
        - name: RATE_LIMIT_MAX
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: RATE_LIMIT_MAX
        - name: SWAGGER_ENABLED
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: SWAGGER_ENABLED
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: LOG_LEVEL
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      initContainers:
      - name: wait-for-postgres
        image: postgres:16-alpine
        env:
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: DATABASE_PORT
        command:
        - sh
        - -c
        - |
          until pg_isready -h $DATABASE_HOST -p $DATABASE_PORT -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done
      - name: wait-for-redis
        image: redis:7-alpine
        env:
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: apifai-config
              key: REDIS_HOST
        command:
        - sh
        - -c
        - |
          until redis-cli -h $REDIS_HOST ping; do
            echo "Waiting for redis..."
            sleep 2
          done
---
apiVersion: v1
kind: Service
metadata:
  name: apifai-api
  namespace: apifai
  labels:
    app: api
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: api
