apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: almyty-ingress
  namespace: almyty
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    # HSTS — tells browsers to remember this origin as HTTPS-only
    # for one year and apply it to subdomains. Combined with the
    # ssl-redirect annotations above, prevents protocol-downgrade
    # MITM attacks and stops an attacker on a coffee-shop wifi
    # from stripping HTTPS with sslstrip-style tools.
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/hsts-preload: "true"
    # TLS posture — explicit minimum protocol version so a future
    # nginx-ingress default change can't silently drop us back to
    # TLS 1.0/1.1 (which have known downgrade + padding-oracle
    # issues). Letsencrypt certs support TLS 1.3 everywhere.
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    # Cipher suite — modern Mozilla "intermediate" profile.
    # Excludes RC4, 3DES, and anything without forward secrecy.
    nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384"
    # Server picks the cipher (not the client) — blocks
    # cipher-order downgrade attacks.
    nginx.ingress.kubernetes.io/ssl-prefer-server-ciphers: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.almyty.com
    secretName: api-almyty-com-tls
  - hosts:
    - app.almyty.com
    secretName: app-almyty-com-tls
  rules:
  - host: api.almyty.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: almyty-api
            port:
              number: 3000
  - host: app.almyty.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: almyty-frontend
            port:
              number: 8080
