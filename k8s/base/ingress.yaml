apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apifai-ingress
  namespace: apifai
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.apifai.io
    secretName: api-apifai-io-tls
  - hosts:
    - app.apifai.io
    secretName: app-apifai-io-tls
  rules:
  - host: api.apifai.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: apifai-api
            port:
              number: 3000
  - host: app.apifai.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: apifai-frontend
            port:
              number: 8080
