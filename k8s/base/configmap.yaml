apiVersion: v1
kind: ConfigMap
metadata:
  name: almyty-config
  namespace: almyty
data:
  # Database Configuration
  DATABASE_HOST: "almyty-postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "almyty"
  DB_SSL: "false"
  DB_SYNC: "false"

  # Redis Configuration
  REDIS_HOST: "almyty-redis"
  REDIS_PORT: "6379"

  # API Configuration
  PORT: "3000"
  NODE_ENV: "production"
  SWAGGER_ENABLED: "false"
  LOG_LEVEL: "info"

  # Rate Limiting
  RATE_LIMIT_TTL: "60"
  RATE_LIMIT_MAX: "100"

  # JWT Configuration
  JWT_EXPIRES_IN: "24h"

  # CORS
  CORS_ORIGIN: "https://app.almyty.dev"

  # Base URL (used by MCP discovery, CLI exports, protocol endpoints)
  BASE_URL: "https://api.almyty.dev"
