apiVersion: v1
kind: ConfigMap
metadata:
  name: almyty-config
  namespace: almyty
data:
  # Database Configuration
  DATABASE_HOST: "almyty-postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "almyty"
  DB_SSL: "false"
  DB_SYNC: "false"
  # Pods do NOT migrate on boot — the deploy workflow runs a single gated
  # migration Job before the rollout (avoids replicas racing migrations).
  DB_MIGRATIONS_RUN: "false"

  # Redis Configuration
  REDIS_HOST: "almyty-redis"
  REDIS_PORT: "6379"

  # API Configuration
  PORT: "3000"
  NODE_ENV: "production"
  SWAGGER_ENABLED: "false"
  LOG_LEVEL: "info"

  # Rate Limiting
  RATE_LIMIT_TTL: "60"
  RATE_LIMIT_MAX: "100"

  # How long telemetry rows (usage_metrics, request_logs) are kept before
  # the retention sweep prunes them. Set to "0" to disable pruning.
  METRICS_RETENTION_DAYS: "90"

  # JWT Configuration
  JWT_EXPIRES_IN: "24h"

  # CORS — primary frontend origin. The backend's main.ts
  # allowlist is built from FRONTEND_URL (wired from CORS_ORIGIN
  # below) + the optional CORS_ALLOWED_ORIGINS comma-separated
  # extras. `origin: true` is no longer used — any request from
  # an origin not in this allowlist is refused at the CORS layer
  # (closes the wildcard-with-credentials finding from the
  # backend audit).
  CORS_ORIGIN: "https://app.almyty.com"
  CORS_ALLOWED_ORIGINS: "https://app.almyty.com"

  # Base URL (used by MCP discovery, CLI exports, protocol endpoints)
  BASE_URL: "https://api.almyty.com"
