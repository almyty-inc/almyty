# Development environment secrets
apiVersion: v1
kind: Secret
metadata:
  name: almyty-secrets
  namespace: almyty-dev
type: Opaque
stringData:
  # Development uses in-cluster postgres
  DATABASE_USERNAME: "postgres"
  DATABASE_PASSWORD: "postgres"
  DATABASE_URL: "postgresql://postgres:postgres@dev-almyty-postgres:5432/almyty"

  # Redis (no password in dev)
  REDIS_PASSWORD: ""
  REDIS_URL: "redis://dev-almyty-redis:6379"

  # JWT secret (dev only)
  JWT_SECRET: "dev-jwt-secret-not-for-production"

  # Credential encryption key (dev only — rotate for prod)
  ENCRYPTION_KEY: "dev-encryption-key-not-for-production"

  # Platform operator bearer token for /monitoring/metrics (dev only)
  PLATFORM_METRICS_TOKEN: "dev-platform-metrics-token"
