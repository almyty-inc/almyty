# Development environment secrets
apiVersion: v1
kind: Secret
metadata:
  name: dev-apifai-secrets
  namespace: apifai-dev
type: Opaque
stringData:
  # Development uses in-cluster postgres
  DATABASE_USERNAME: "postgres"
  DATABASE_PASSWORD: "postgres"
  DATABASE_URL: "postgresql://postgres:postgres@dev-apifai-postgres:5432/apifai"

  # Redis (no password in dev)
  REDIS_PASSWORD: ""
  REDIS_URL: "redis://dev-apifai-redis:6379"

  # JWT secret (dev only)
  JWT_SECRET: "dev-jwt-secret-not-for-production"
