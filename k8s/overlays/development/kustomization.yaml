apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: almyty-dev

namePrefix: dev-

resources:
  - ../../base
  # secret.yaml removed — dev mirrors staging's pattern of
  # creating almyty-secrets via the deploy-development.yml
  # workflow with values pulled from GH repo secrets
  # (DEV_DATABASE_URL, DEV_ENCRYPTION_KEY, STAGING_DATABASE_*,
  # STAGING_JWT_SECRET, RESEND_API_KEY).

patches:
  - target:
      kind: Namespace
      name: almyty
    patch: |-
      - op: replace
        path: /metadata/name
        value: almyty-dev

  - target:
      kind: ConfigMap
      name: almyty-config
    patch: |-
      - op: replace
        path: /data/NODE_ENV
        value: production
      - op: replace
        path: /data/SWAGGER_ENABLED
        value: "true"
      - op: replace
        path: /data/LOG_LEVEL
        value: info
      - op: replace
        path: /data/CORS_ORIGIN
        value: "https://app.dev.almyty.com"
      - op: replace
        path: /data/DATABASE_HOST
        value: "apifai-db-do-user-4308986-0.j.db.ondigitalocean.com"
      - op: replace
        path: /data/DATABASE_PORT
        value: "25060"
      - op: replace
        path: /data/DATABASE_NAME
        value: "almyty_dev"
      - op: replace
        path: /data/REDIS_HOST
        value: "dev-almyty-redis"
      - op: replace
        path: /data/DB_SSL
        value: "true"
      - op: replace
        path: /data/BASE_URL
        value: "https://api.dev.almyty.com"
      - op: replace
        path: /data/DB_SYNC
        value: "false"

  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  # Dev points at the same DigitalOcean managed Postgres
  # cluster as staging + production, but with its own database
  # name (almyty_dev) for data isolation. Scale the in-cluster
  # postgres deployment to 0 — it's only there as a fallback
  # for the local docker-compose dev path.
  - target:
      kind: Deployment
      name: postgres
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 0

  - target:
      kind: Ingress
      name: almyty-ingress
    patch: |-
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: dev-letsencrypt-prod
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.dev.almyty.com
      - op: replace
        path: /spec/tls/0/secretName
        value: api-dev-almyty-com-tls
      - op: replace
        path: /spec/tls/1/hosts/0
        value: app.dev.almyty.com
      - op: replace
        path: /spec/tls/1/secretName
        value: app-dev-almyty-com-tls
      - op: replace
        path: /spec/rules/0/host
        value: api.dev.almyty.com
      - op: replace
        path: /spec/rules/1/host
        value: app.dev.almyty.com

images:
  - name: ghcr.io/almyty-inc/almyty/api
    newTag: dev-latest
  - name: ghcr.io/almyty-inc/almyty/frontend
    newTag: dev-latest
