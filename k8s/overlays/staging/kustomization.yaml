apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: almyty-staging

namePrefix: staging-

resources:
  - ../../base
  # secret.yaml removed — secrets managed via kubectl in CI/CD workflow

patches:
  - target:
      kind: Namespace
      name: almyty
    patch: |-
      - op: replace
        path: /metadata/name
        value: almyty-staging

  - target:
      kind: ConfigMap
      name: almyty-config
    patch: |-
      - op: replace
        path: /data/NODE_ENV
        value: production
      - op: replace
        path: /data/SWAGGER_ENABLED
        value: "true"
      - op: replace
        path: /data/LOG_LEVEL
        value: info
      - op: replace
        path: /data/CORS_ORIGIN
        value: "https://app.staging.almyty.com"
      - op: replace
        path: /data/DATABASE_HOST
        value: "almyty-db-do-user-4308986-0.j.db.ondigitalocean.com"
      - op: replace
        path: /data/DATABASE_PORT
        value: "25060"
      - op: replace
        path: /data/REDIS_HOST
        value: "staging-almyty-redis"
      - op: replace
        path: /data/DB_SSL
        value: "true"
      - op: replace
        path: /data/BASE_URL
        value: "https://api.staging.almyty.com"
      - op: replace
        path: /data/DB_SYNC
        value: "true"

  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  # Staging uses managed database — scale in-cluster postgres to 0
  - target:
      kind: Deployment
      name: postgres
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 0

  - target:
      kind: Ingress
      name: almyty-ingress
    patch: |-
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: staging-letsencrypt-prod
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.staging.almyty.com
      - op: replace
        path: /spec/tls/0/secretName
        value: api-staging-almyty-com-tls
      - op: replace
        path: /spec/tls/1/hosts/0
        value: app.staging.almyty.com
      - op: replace
        path: /spec/tls/1/secretName
        value: app-staging-almyty-com-tls
      - op: replace
        path: /spec/rules/0/host
        value: api.staging.almyty.com
      - op: replace
        path: /spec/rules/1/host
        value: app.staging.almyty.com

images:
  - name: ghcr.io/frane/almyty/api
    newTag: staging-latest
  - name: ghcr.io/frane/almyty/frontend
    newTag: staging-latest
