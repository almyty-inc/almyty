apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apifai-staging

namePrefix: staging-

resources:
  - ../../base
  - secret.yaml

patches:
  - target:
      kind: Namespace
      name: apifai
    patch: |-
      - op: replace
        path: /metadata/name
        value: apifai-staging

  - target:
      kind: ConfigMap
      name: apifai-config
    patch: |-
      - op: replace
        path: /data/NODE_ENV
        value: production
      - op: replace
        path: /data/SWAGGER_ENABLED
        value: "true"
      - op: replace
        path: /data/LOG_LEVEL
        value: info
      - op: replace
        path: /data/CORS_ORIGIN
        value: "https://app.staging.apifai.io"

  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  # Staging uses managed database — scale in-cluster postgres to 0
  - target:
      kind: Deployment
      name: postgres
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 0

  - target:
      kind: Ingress
      name: apifai-ingress
    patch: |-
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-prod
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.staging.apifai.io
      - op: replace
        path: /spec/tls/0/secretName
        value: api-staging-apifai-io-tls
      - op: replace
        path: /spec/tls/1/hosts/0
        value: app.staging.apifai.io
      - op: replace
        path: /spec/tls/1/secretName
        value: app-staging-apifai-io-tls
      - op: replace
        path: /spec/rules/0/host
        value: api.staging.apifai.io
      - op: replace
        path: /spec/rules/1/host
        value: app.staging.apifai.io

images:
  - name: ghcr.io/frane/apifai/api
    newTag: staging-latest
  - name: ghcr.io/frane/apifai/frontend
    newTag: staging-latest
