# Staging environment secrets
# IMPORTANT: Update these values before deploying!
apiVersion: v1
kind: Secret
metadata:
  name: staging-apifai-secrets
  namespace: apifai-staging
type: Opaque
stringData:
  # Database credentials — UPDATE THESE
  DATABASE_USERNAME: "CHANGE_ME_IN_STAGING"
  DATABASE_PASSWORD: "CHANGE_ME_IN_STAGING"
  DATABASE_URL: "postgresql://CHANGE_ME@CHANGE_ME:25060/defaultdb?sslmode=require"

  # Redis credentials
  REDIS_PASSWORD: ""
  REDIS_URL: "redis://staging-apifai-redis:6379"

  # JWT secret
  JWT_SECRET: "CHANGE_ME_GENERATE_STRONG_SECRET"
