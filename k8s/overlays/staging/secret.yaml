# Staging environment secrets — managed database credentials
# IMPORTANT: Do NOT commit real credentials here!
# Apply real secrets via kubectl:
#   kubectl create secret generic staging-almyty-secrets \
#     --from-literal=DATABASE_USERNAME=doadmin \
#     --from-literal=DATABASE_PASSWORD=<password> \
#     --from-literal=DATABASE_URL=<full-url> \
#     --from-literal=REDIS_PASSWORD= \
#     --from-literal=REDIS_URL=redis://staging-almyty-redis:6379 \
#     --from-literal=JWT_SECRET=<secret> \
#     -n almyty-staging --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: almyty-secrets
  namespace: almyty-staging
type: Opaque
stringData:
  DATABASE_USERNAME: "CHANGE_ME"
  DATABASE_PASSWORD: "CHANGE_ME"
  DATABASE_URL: "postgresql://CHANGE_ME@CHANGE_ME:25060/almyty?sslmode=require"

  REDIS_PASSWORD: ""
  REDIS_URL: "redis://staging-almyty-redis:6379"

  JWT_SECRET: "CHANGE_ME_GENERATE_STRONG_SECRET"
