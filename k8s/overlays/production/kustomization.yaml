apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apifai-production

namePrefix: prod-

resources:
  - ../../base
  # secret.yaml removed — secrets managed via kubectl in CI/CD workflow

patches:
  - target:
      kind: Namespace
      name: apifai
    patch: |-
      - op: replace
        path: /metadata/name
        value: apifai-production

  - target:
      kind: ConfigMap
      name: apifai-config
    patch: |-
      - op: replace
        path: /data/NODE_ENV
        value: production
      - op: replace
        path: /data/SWAGGER_ENABLED
        value: "false"
      - op: replace
        path: /data/LOG_LEVEL
        value: warn
      - op: replace
        path: /data/CORS_ORIGIN
        value: "https://app.apif.ai"
      - op: replace
        path: /data/DATABASE_HOST
        value: "prod-apifai-postgres"
      - op: replace
        path: /data/REDIS_HOST
        value: "prod-apifai-redis"
      - op: replace
        path: /data/DB_SSL
        value: "true"

  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  # Production uses managed database — scale in-cluster postgres to 0
  - target:
      kind: Deployment
      name: postgres
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 0

  - target:
      kind: Ingress
      name: apifai-ingress
    patch: |-
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-prod
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.apif.ai
      - op: replace
        path: /spec/tls/1/hosts/0
        value: app.apif.ai
      - op: replace
        path: /spec/rules/0/host
        value: api.apif.ai
      - op: replace
        path: /spec/rules/1/host
        value: app.apif.ai

images:
  - name: ghcr.io/frane/apifai/api
    newTag: v1.0.0
  - name: ghcr.io/frane/apifai/frontend
    newTag: v1.0.0
