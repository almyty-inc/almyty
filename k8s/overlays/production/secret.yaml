# Production environment secrets — managed database credentials
# IMPORTANT: Update these values before deploying to production!
apiVersion: v1
kind: Secret
metadata:
  name: almyty-secrets
  namespace: almyty-production
type: Opaque
stringData:
  # Managed PostgreSQL credentials — UPDATE THESE
  DATABASE_USERNAME: "CHANGE_ME_IN_PRODUCTION"
  DATABASE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  DATABASE_URL: "postgresql://CHANGE_ME@CHANGE_ME:25060/defaultdb?sslmode=require"

  # Managed Redis credentials — UPDATE THESE
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  REDIS_URL: "redis://:CHANGE_ME_IN_PRODUCTION@prod-almyty-redis:6379"

  # JWT secrets — GENERATE NEW ONES: openssl rand -base64 64
  JWT_SECRET: "CHANGE_ME_GENERATE_STRONG_SECRET"

  # Credential encryption key — REQUIRED in production. Backend
  # hard-fails on credential operations if missing. openssl rand -base64 48
  ENCRYPTION_KEY: "CHANGE_ME_GENERATE_STRONG_ENCRYPTION_KEY"

  # Platform operator bearer token for /monitoring/metrics +
  # /monitoring/metrics/prometheus. Fail-closed if unset.
  # Generate with: openssl rand -base64 48
  PLATFORM_METRICS_TOKEN: "CHANGE_ME_GENERATE_STRONG_SECRET"
