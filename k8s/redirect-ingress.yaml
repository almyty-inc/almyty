# Redirect ingress: almyty.ai + almyty.dev → almyty.com
#
# DNS: Point A records for almyty.ai and almyty.dev to the same LB IP as almyty.com.
# This ingress catches those domains and 301-redirects everything to almyty.com.
# cert-manager issues TLS certs for the redirect domains via Let's Encrypt.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: almyty-redirect
  namespace: almyty
  annotations:
    nginx.ingress.kubernetes.io/permanent-redirect: "https://almyty.com$request_uri"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - almyty.ai
    - "*.almyty.ai"
    secretName: almyty-ai-redirect-tls
  - hosts:
    - almyty.dev
    - "*.almyty.dev"
    secretName: almyty-dev-redirect-tls
  rules:
  # almyty.ai → almyty.com
  - host: almyty.ai
    http: &redirect
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: almyty-frontend
            port:
              number: 8080
  - host: "*.almyty.ai"
    http: *redirect
  # almyty.dev → almyty.com
  - host: almyty.dev
    http: *redirect
  - host: "*.almyty.dev"
    http: *redirect
