# Redirect ingress: all alternate domains → almyty.com
#
# DNS: A records for all domains below point to 129.212.254.179 (ingress LB).
# cert-manager issues TLS certs for each via Let's Encrypt.
# nginx does 301 permanent redirect preserving the request URI.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: almyty-redirect
  namespace: almyty
  annotations:
    nginx.ingress.kubernetes.io/permanent-redirect: "https://almyty.com$request_uri"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - almyty.ai
    - "*.almyty.ai"
    secretName: almyty-ai-tls
  - hosts:
    - almyty.dev
    - "*.almyty.dev"
    secretName: almyty-dev-tls
  - hosts:
    - almyty.tech
    - "*.almyty.tech"
    secretName: almyty-tech-tls
  - hosts:
    - almyty.io
    - "*.almyty.io"
    secretName: almyty-io-tls
  - hosts:
    - almyty.net
    - "*.almyty.net"
    secretName: almyty-net-tls
  rules:
  - host: almyty.ai
    http: &redirect
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: almyty-frontend
            port:
              number: 8080
  - host: "*.almyty.ai"
    http: *redirect
  - host: almyty.dev
    http: *redirect
  - host: "*.almyty.dev"
    http: *redirect
  - host: almyty.tech
    http: *redirect
  - host: "*.almyty.tech"
    http: *redirect
  - host: almyty.io
    http: *redirect
  - host: "*.almyty.io"
    http: *redirect
  - host: almyty.net
    http: *redirect
  - host: "*.almyty.net"
    http: *redirect
