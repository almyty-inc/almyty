# Docs site deployment — docs.almyty.com
# Build: docker build -t ghcr.io/almyty-inc/almyty/docs:latest ./docs-site
# Push: docker push ghcr.io/almyty-inc/almyty/docs:latest
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
  namespace: almyty-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs
  template:
    metadata:
      labels:
        app: docs
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      # The docs image is built on node:24-alpine and runs as the
      # pre-existing `node` user at uid 1000 (see docs-site/Dockerfile).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: docs
        image: ghcr.io/almyty-inc/almyty/docs:latest
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: docs
  namespace: almyty-staging
spec:
  selector:
    app: docs
  ports:
  - port: 3000
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docs-ingress
  namespace: almyty-staging
  annotations:
    cert-manager.io/cluster-issuer: "staging-letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - docs.almyty.com
    secretName: docs-almyty-com-tls
  rules:
  - host: docs.almyty.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: docs
            port:
              number: 3000
